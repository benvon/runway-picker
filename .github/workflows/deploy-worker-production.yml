name: Deploy METAR Worker Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy (for workflow-dispatched production deploys)
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-worker:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.release.draft == false && github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      AIRPORT_IO_TOKEN: ${{ secrets.AIRPORT_IO_TOKEN }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="${EVENT_RELEASE_TAG}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_RELEASE_TAG}"
          fi

          if [ -z "$tag" ]; then
            echo "Could not resolve release tag."
            exit 1
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z. Got: $tag"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "tag_ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout released tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_ref }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare configuration
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$AIRPORT_IO_TOKEN" ]; then
            echo "Missing Cloudflare config. Set CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and AIRPORT_IO_TOKEN."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Set AirportDB token secret
        shell: bash
        run: |
          printf '%s' "$AIRPORT_IO_TOKEN" | npx wrangler secret put AIRPORTDB_API_TOKEN --config workers/metar-proxy/wrangler.jsonc

      - name: Deploy METAR Worker
        shell: bash
        run: |
          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            if npx wrangler deploy --config workers/metar-proxy/wrangler.jsonc; then
              exit 0
            fi

            if [ "$attempt" -eq "$attempts" ]; then
              echo "Worker production deploy failed after $attempts attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Retrying worker production deploy in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
