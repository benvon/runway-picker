name: Deploy Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  checks: read
  contents: read
  pull-requests: write

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI validate check to pass
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.payload.pull_request.head.sha;
            const targetCheckNames = new Set(['validate', 'CI / validate']);
            const maxAttempts = 40;
            const delayMs = 15000;

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100,
              });

              const checkRun = data.check_runs.find((run) => targetCheckNames.has(run.name));

              if (checkRun?.status === 'completed') {
                if (checkRun.conclusion === 'success') {
                  core.info(`CI validate check succeeded for ${ref}.`);
                  return;
                }

                core.setFailed(
                  `CI validate check completed with conclusion '${checkRun.conclusion}' for ${ref}.`
                );
                return;
              }

              core.info(
                `Attempt ${attempt}/${maxAttempts}: CI validate check not completed yet for ${ref}.`
              );
              await sleep(delayMs);
            }

            core.setFailed(
              `Timed out waiting for CI validate check to complete for ${ref}.`
            );

  deploy-preview:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.fork == false
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
      CLOUDFLARE_METAR_CACHE_PREVIEW_NAMESPACE_ID: ${{ vars.CLOUDFLARE_METAR_CACHE_PREVIEW_NAMESPACE_ID }}
      CLOUDFLARE_METAR_WORKER_NAME: ${{ vars.CLOUDFLARE_METAR_WORKER_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate Cloudflare configuration
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_PROJECT_NAME" ] || [ -z "$CLOUDFLARE_METAR_CACHE_PREVIEW_NAMESPACE_ID" ]; then
            echo "Missing Cloudflare config. Set CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_PROJECT_NAME, and CLOUDFLARE_METAR_CACHE_PREVIEW_NAMESPACE_ID."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Generate preview deployment Wrangler configs
        id: preview-config
        shell: bash
        run: |
          worker_name="${CLOUDFLARE_METAR_WORKER_NAME:-runway-picker-metar-api}"
          preview_worker_config="workers/metar-proxy/wrangler.preview.generated.json"
          preview_pages_config="wrangler.preview.generated.json"

          PREVIEW_WORKER_CONFIG="$preview_worker_config" \
          PREVIEW_PAGES_CONFIG="$preview_pages_config" \
          METAR_WORKER_NAME="$worker_name" \
          METAR_CACHE_PREVIEW_NAMESPACE_ID="$CLOUDFLARE_METAR_CACHE_PREVIEW_NAMESPACE_ID" \
          node <<'EOF'
          const fs = require('node:fs');

          const workerConfig = JSON.parse(
            fs.readFileSync('workers/metar-proxy/wrangler.jsonc', 'utf8')
          );
          workerConfig.env = workerConfig.env ?? {};
          workerConfig.env.preview = workerConfig.env.preview ?? {};
          workerConfig.env.preview.kv_namespaces = [
            {
              binding: 'METAR_CACHE',
              id: process.env.METAR_CACHE_PREVIEW_NAMESPACE_ID
            }
          ];
          fs.writeFileSync(
            process.env.PREVIEW_WORKER_CONFIG,
            `${JSON.stringify(workerConfig, null, 2)}\n`
          );

          const pagesConfig = JSON.parse(fs.readFileSync('wrangler.jsonc', 'utf8'));
          pagesConfig.env = pagesConfig.env ?? {};
          pagesConfig.env.preview = pagesConfig.env.preview ?? {};
          pagesConfig.env.preview.services = [
            {
              binding: 'METAR_API',
              service: `${process.env.METAR_WORKER_NAME}-preview`
            }
          ];
          fs.writeFileSync(
            process.env.PREVIEW_PAGES_CONFIG,
            `${JSON.stringify(pagesConfig, null, 2)}\n`
          );
          EOF

          echo "preview_worker_config=$preview_worker_config" >> "$GITHUB_OUTPUT"
          echo "preview_pages_config=$preview_pages_config" >> "$GITHUB_OUTPUT"

      - name: Deploy METAR Worker preview environment
        shell: bash
        run: |
          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            if npx wrangler deploy --config "${{ steps.preview-config.outputs.preview_worker_config }}" --env preview; then
              exit 0
            fi

            if [ "$attempt" -eq "$attempts" ]; then
              echo "Worker preview deploy failed after $attempts attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Retrying worker preview deploy in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        shell: bash
        run: |
          cp "${{ steps.preview-config.outputs.preview_pages_config }}" wrangler.jsonc
          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            set -o pipefail
            if npx wrangler pages deploy dist \
              --project-name "$CLOUDFLARE_PROJECT_NAME" \
              --branch "${{ github.event.pull_request.head.ref }}" \
              --commit-hash "${{ github.event.pull_request.head.sha }}" \
              | tee deploy-output.txt; then
              break
            fi

            if [ "$attempt" -eq "$attempts" ]; then
              echo "Pages preview deploy failed after $attempts attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Retrying pages preview deploy in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

          preview_url="$(grep -Eo 'https://[^ ]+\.pages\.dev[^ ]*' deploy-output.txt | tail -n1)"
          if [ -z "$preview_url" ]; then
            echo "Could not extract preview URL from wrangler output."
            exit 1
          fi

          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Smoke test preview cache behavior
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: |
          node scripts/verify-preview-cache.mjs "$PREVIEW_URL"

      - name: Post or update PR comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const marker = '<!-- runway-picker-preview -->';
            const body = `${marker}\nPreview deployment ready: ${process.env.PREVIEW_URL}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
