name: Deploy Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to deploy (for workflow-dispatched production deploys)
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-production:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.release.draft == false && github.event.release.prerelease == false)
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PROJECT_NAME: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DISPATCH_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="${EVENT_RELEASE_TAG}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${DISPATCH_RELEASE_TAG}"
          fi

          if [ -z "$tag" ]; then
            echo "Could not resolve release tag."
            exit 1
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z. Got: $tag"
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null; then
            echo "Release tag $tag was not found in origin."
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "tag_ref=refs/tags/$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout released tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag_ref }}

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 22
          cache: npm

      - name: Capture release metadata
        id: metadata
        shell: bash
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate Cloudflare configuration
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_PROJECT_NAME" ]; then
            echo "Missing Cloudflare config. Set CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and CLOUDFLARE_PROJECT_NAME."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm run test

      - name: Build
        env:
          VITE_APP_VERSION: ${{ steps.release.outputs.tag }}
          VITE_APP_COMMIT_SHA: ${{ steps.metadata.outputs.commit_sha }}
        run: npm run build

      - name: Deploy production to Cloudflare Pages
        shell: bash
        env:
          COMMIT_SHA: ${{ steps.metadata.outputs.commit_sha }}
        run: |
          attempts=5
          for attempt in $(seq 1 "$attempts"); do
            if npx wrangler pages deploy dist \
              --project-name "$CLOUDFLARE_PROJECT_NAME" \
              --branch main \
              --commit-hash "$COMMIT_SHA"; then
              exit 0
            fi

            if [ "$attempt" -eq "$attempts" ]; then
              echo "Pages production deploy failed after $attempts attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 10))
            echo "Retrying pages production deploy in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done
